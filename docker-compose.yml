version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql-strapi
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: strongpassword123
      MYSQL_DATABASE: iotwebsite_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  strapi:
    build: ./cms
    container_name: strapi
    restart: always
    ports:
      - "6000:1337"   # ⭐ ตรงนี้คือสิ่งสำคัญ
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: mysql
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: iotwebsite_db
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: strongpassword123
      APP_KEYS: your_app_keys
      API_TOKEN_SALT: your_token_salt
      ADMIN_JWT_SECRET: your_admin_secret
      JWT_SECRET: your_jwt_secret
    volumes:
      - ./cms/public/uploads:/app/public/uploads

volumes:
  mysql_data: