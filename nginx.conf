events {}

http {

  server {

    listen 80;

    location / {
      proxy_pass http://nuxt:3000;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
    }

    location /api {
      proxy_pass http://strapi:1337;
    }

    location /uploads {
      proxy_pass http://strapi:1337;
    }

    location /admin {
      proxy_pass http://strapi:1337;
    }

  }

}